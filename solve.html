<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quadratic Equation Solver</title>
</head>
<body>
    <script>
        // 步骤1：调用3次prompt，获取用户输入的系数a、b、c
        let aInput = prompt("请输入二次项系数 a：");
        let bInput = prompt("请输入一次项系数 b：");
        let cInput = prompt("请输入常数项 c：");

        // 步骤2：用parseFloat将输入转为数字
        let a = parseFloat(aInput);
        let b = parseFloat(bInput);
        let c = parseFloat(cInput);

        // 步骤3：计算判别式 delta = b² - 4ac（题目假设delta≥0，a>0）
        let delta = b * b - 4 * a * c;

        // 步骤4：计算两个根x1、x2
        let x1 = (-b + Math.sqrt(delta)) / 2 / a;
        let x2 = (-b - Math.sqrt(delta)) / 2 / a;

        // 步骤5：用alert弹窗展示结果
        alert(`二次方程 ax² + bx + c = 0 的解为：\nx₁ = ${x1.toFixed(4)}\nx₂ = ${x2.toFixed(4)}`);

        // 步骤6：用console.log在控制台输出相同结果
        console.log("=== 二次方程求解结果 ===");
        console.log("输入系数：a =", a, ", b =", b, ", c =", c);
        console.log("判别式 delta =", delta);
        console.log("方程的两个根：x₁ =", x1, ", x₂ =", x2);
    </script>
</body>
</html>
