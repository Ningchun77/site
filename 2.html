<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cube with Gradients</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            perspective: 1000px; /* 开启 3D 透视 */
        }

        .cube {
            position: relative;
            width: 200px;
            height: 200px;
            transform-style: preserve-3d; /* 子元素保持 3D 效果 */
            animation: rotate 10s infinite linear; /* 自动旋转动画 */
        }

        .face {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            opacity: 0.9;
        }

        /* 上面（红色到绿色渐变） */
        .top {
            background: linear-gradient(to bottom, #ff0000, #00ff00);
            transform: translateY(-100px) rotateX(90deg);
        }

        /* 下面 */
        .bottom {
            background: linear-gradient(to right, #0000ff, #ffff00);
            transform: translateY(100px) rotateX(-90deg);
        }

        /* 前面 */
        .front {
            background: linear-gradient(to right, #ff00ff, #00ffff);
            transform: translateZ(100px);
        }

        /* 后面 */
        .back {
            background: linear-gradient(to right, #ff9900, #9900ff);
            transform: translateZ(-100px) rotateY(180deg);
        }

        /* 左面 */
        .left {
            background: linear-gradient(to bottom, #00ff99, #ff0099);
            transform: translateX(-100px) rotateY(-90deg);
        }

        /* 右面 */
        .right {
            background: linear-gradient(to bottom, #99ff00, #0099ff);
            transform: translateX(100px) rotateY(90deg);
        }

        @keyframes rotate {
            0% { transform: rotateX(0) rotateY(0); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }
    </style>
</head>
<body>
    <div class="cube">
        <div class="face top"></div>
        <div class="face bottom"></div>
        <div class="face front"></div>
        <div class="face back"></div>
        <div class="face left"></div>
        <div class="face right"></div>
    </div>
</body>
</html>
